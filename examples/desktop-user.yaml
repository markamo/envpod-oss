# Desktop pod with host user environment cloned in.
#
# Combines clone_host (your dotfiles, shell, workspace dirs) with a
# full XFCE desktop via noVNC. Open http://localhost:6080 and you get
# a familiar desktop with your files — all isolated with COW.
#
# Change desktop_env to openbox (~50MB) or sway (~150MB) for lighter options.
#
# Usage:
#   sudo envpod init my-desktop -c examples/desktop-user.yaml
#   sudo envpod setup my-desktop
#   sudo envpod run my-desktop -b -- startxfce4
#   # Open the noVNC URL from `envpod ls` in your browser

name: my-desktop
type: standard
user: root

web_display:
  type: novnc
  port: 6080
  resolution: "1280x720"
  audio: true

devices:
  desktop_env: xfce

host_user:
  clone_host: true
  dirs:
    - Documents
    - Projects
    - src
  # include_dotfiles:
  #   - .bashrc
  #   - .gitconfig
  #   - .vimrc

filesystem:
  system_access: advanced
  mount_cwd: true

network:
  mode: Monitored
  dns:
    mode: Blacklist
    deny:
      - "*.internal"
      - "*.local"
      - "*.corp"

processor:
  cores: 2.0
  memory: "4GB"
  max_pids: 2048

security:
  seccomp_profile: browser
  shm_size: "256MB"

budget:
  max_duration: "8h"

audit:
  action_log: true

setup:
  - |
    if command -v google-chrome >/dev/null 2>&1; then
      echo "Chrome already available"
    else
      apt-get install -y wget gnupg
      wget -qO- https://dl.google.com/linux/linux_signing_key.pub | gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
      echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" > /etc/apt/sources.list.d/google-chrome.list
      apt-get update && apt-get install -y google-chrome-stable
    fi
