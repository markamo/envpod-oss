# Auto-mount host applications — no reinstall inside the pod.
# envpod resolves each binary via `which` + `ldd`, then bind-mounts
# the binary, shared libraries, and known data directories read-only.
name: host-apps-demo
type: standard

filesystem:
  system_access: safe
  apps:
    - google-chrome
    - python3
    - node

network:
  mode: Isolated
  dns:
    mode: Whitelist
    allow:
      - "*.google.com"
      - "*.googleapis.com"
      - "*.npmjs.org"
      - "pypi.org"
