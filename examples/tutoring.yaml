# AI Tutor — student files read-only, tutor writes suggestions via overlay
#
# Mount student's project read-only. The AI tutor can write suggestions,
# create example files, add comments — all in the overlay. Student reviews
# the tutor's changes with diff and accepts what's helpful.
#
# Usage:
#   cd /path/to/student/project
#   sudo envpod init tutor -c examples/tutoring.yaml
#   sudo envpod run tutor -- python3 /workspace/tutor.py
#   sudo envpod diff tutor                → see tutor's suggestions
#   sudo envpod commit tutor src/fix.py   → accept specific fixes
#   sudo envpod rollback tutor            → reject all suggestions

name: tutor
type: standard

filesystem:
  system_access: advanced
  mount_cwd: true
  tracking:
    watch: [/home, /workspace]
    ignore: [/var/cache, /var/lib/apt, /tmp, /run, node_modules, __pycache__, .git/objects]

network:
  mode: Monitored
  dns:
    mode: Allowlist
    allow:
      - api.anthropic.com
      - api.openai.com

processor:
  cores: 2.0
  memory: "4GB"
  max_pids: 256

budget:
  max_duration: "2h"

audit:
  action_log: true

setup:
  - "apt-get update && apt-get install -y --no-install-recommends python3 python3-pip git"
  - "pip install anthropic openai"
