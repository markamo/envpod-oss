# Desktop pod — lightweight XFCE desktop via noVNC
#
# A full graphical desktop environment (XFCE4) accessible via browser
# at http://localhost:6080. Uses Xvfb + x11vnc + websockify (noVNC).
# Lightweight — XFCE uses ~200MB RAM. Good for GUI apps, browser testing,
# or any workflow that needs a desktop.
#
# The `desktop_env: xfce` option auto-installs XFCE during setup.
# Other options: openbox (~50MB, ultra-minimal), sway (Wayland-native).
# Chrome install (~300MB) is in setup commands. First init takes 2-4 min.
# After first setup, use `envpod clone` for instant copies.
#
# Usage:
#   sudo envpod init desktop -c examples/desktop.yaml
#   sudo envpod setup desktop
#   sudo envpod start desktop
#   # Open the noVNC URL from `envpod ls` in your browser
#
# Fallback: if the desktop doesn't appear, start it manually:
#   sudo envpod run desktop -b -- startxfce4

name: desktop
type: standard
user: root

web_display:
  type: novnc
  port: 6080
  resolution: "1280x720"
  # audio: true          # [beta] Opus/WebM audio streaming on port 6081

devices:
  desktop_env: xfce

filesystem:
  system_access: advanced

network:
  mode: Monitored
  dns:
    mode: Blacklist
    deny:
      - "*.internal"
      - "*.local"
      - "*.corp"

processor:
  cores: 2.0
  memory: "2GB"
  max_pids: 2048

security:
  seccomp_profile: browser
  shm_size: "256MB"

budget:
  max_duration: "8h"

audit:
  action_log: true

start_command: ["sleep", "infinity"]  # Desktop auto-starts via daemon; this keeps the pod alive

setup:
  - |
    if command -v google-chrome >/dev/null 2>&1; then
      echo "Chrome already available"
    else
      apt-get install -y wget gnupg
      wget -qO- https://dl.google.com/linux/linux_signing_key.pub | gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
      echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" > /etc/apt/sources.list.d/google-chrome.list
      apt-get update && apt-get install -y google-chrome-stable
    fi
    # Fix desktop shortcut: add --no-sandbox (envpod namespaces replace Chrome's sandbox)
    sed -i 's|Exec=/usr/bin/google-chrome-stable|Exec=/usr/bin/google-chrome-stable --no-sandbox|g' /usr/share/applications/google-chrome.desktop 2>/dev/null
  # Set Chrome as default browser (enables OAuth flows for CLI tools like Claude Code)
  - "xdg-settings set default-web-browser google-chrome.desktop 2>/dev/null || true"
