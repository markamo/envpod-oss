# GIMP pod — image editor in an isolated desktop via noVNC
#
# Runs GIMP inside a sandboxed pod with a full XFCE desktop accessible
# via noVNC. Your ~/Pictures directory is mounted read-only with COW —
# edits stay in the overlay until you `envpod commit`.
#
# GIMP is installed via apt during setup (~150MB). First init takes 2-3 min.
# After first setup, use `envpod clone` for instant copies.
#
# Usage:
#   sudo envpod init gimp -c examples/gimp.yaml
#   sudo envpod setup gimp
#
#   # Desktop mode (recommended) — launches full XFCE desktop in background,
#   # terminal stays free for envpod commands. Open GIMP from the desktop menu.
#   sudo envpod run gimp -b -- startxfce4
#   # Open the noVNC URL shown by `envpod ls` in your browser
#
#   # Direct mode — launches GIMP only (blocks terminal, Ctrl+Z to detach):
#   sudo envpod run gimp -- gimp
#
# Lock/unlock (freeze/thaw) — GIMP survives perfectly:
#   sudo envpod lock gimp     # freezes pod instantly — noVNC stays connected
#   sudo envpod unlock gimp   # resumes exactly where you left off
#   GIMP is a single-process app so it handles freeze/thaw cleanly.
#   Display services run in a guardian cgroup that survives freeze/thaw.
#   (Multi-process apps like Chrome/VS Code may crash on resume.)
#
# Governance:
#   sudo envpod diff gimp     # see what changed in the overlay
#   sudo envpod commit gimp   # apply changes to host
#   sudo envpod rollback gimp # discard all changes

name: gimp
type: standard
user: root

web_display:
  type: novnc
  port: 6080
  resolution: "1920x1080"

devices:
  desktop_env: xfce

filesystem:
  system_access: advanced
  mounts:
    - path: ~/Pictures
      permissions: ReadOnly

network:
  mode: Monitored
  dns:
    mode: Blacklist
    deny:
      - "*.internal"
      - "*.local"
      - "*.corp"

processor:
  cores: 4.0
  memory: "4GB"
  max_pids: 2048

security:
  seccomp_profile: browser
  shm_size: "256MB"

budget:
  max_duration: "8h"

audit:
  action_log: true

setup:
  - "apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends gimp"
