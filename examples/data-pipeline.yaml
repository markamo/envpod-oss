# Data Pipeline — read data, process, write results, all governed
#
# Agent reads input data, processes it (ETL, analysis, transformation),
# and writes output. Everything in the overlay. Review the output with
# diff before committing to your real filesystem.
#
# Usage:
#   sudo envpod init pipeline -c examples/data-pipeline.yaml
#   sudo envpod run pipeline -- python3 /workspace/pipeline.py
#   sudo envpod diff pipeline                    → see output files
#   sudo envpod commit pipeline /workspace/output → commit only output
#   sudo envpod rollback pipeline                → discard everything

name: data-pipeline
type: standard

filesystem:
  system_access: advanced
  workspace: /workspace
  mount_cwd: true
  tracking:
    watch: [/workspace]
    ignore: [/var/cache, /var/lib/apt, /tmp, /run]

network:
  mode: Isolated
  dns:
    mode: Allowlist
    allow: []

processor:
  cores: 4.0
  memory: "16GB"
  max_pids: 256

devices:
  gpu: false

budget:
  max_duration: "4h"

audit:
  action_log: true

setup:
  - "apt-get update && apt-get install -y --no-install-recommends python3 python3-pip"
  - "pip install pandas numpy pyarrow duckdb"
  - "mkdir -p /workspace/input /workspace/output"
