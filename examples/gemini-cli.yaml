# Gemini CLI pod — Google's terminal AI coding agent
#
# Gemini CLI is Google's official CLI for Gemini, used for code generation,
# debugging, and software engineering tasks from the terminal. Requires
# Node.js 18+ runtime (installed via nvm during setup).
#
# Needs: generativelanguage.googleapis.com (Gemini API), npm registry,
# GitHub (code operations), Node.js downloads.
# Uses system_access: advanced for nvm to install Node.js.
#
# Usage:
#   sudo envpod init gemini-cli -c examples/gemini-cli.yaml
#   sudo envpod setup gemini-cli
#   sudo envpod run gemini-cli -- gemini

name: gemini-cli
type: standard
backend: native

network:
  mode: Monitored
  dns:
    mode: Allowlist
    allow:
      # Gemini API
      - generativelanguage.googleapis.com
      - "*.googleapis.com"
      # GitHub (code, PRs, issues)
      - github.com
      - "*.github.com"
      - "*.githubusercontent.com"
      # npm registry
      - registry.npmjs.org
      - "*.npmjs.org"
      # nvm + Node.js downloads
      - nodejs.org
      - "*.nodejs.org"

filesystem:
  system_access: advanced
  tracking:
    watch:
      - /home
      - /opt
      - /root
      - /workspace
    ignore:
      - /var/cache
      - /var/lib/apt
      - /var/lib/dpkg
      - /tmp
      - /run
      - /opt/nvm             # nvm install dir
      - /root/.npm

processor:
  cores: 2.0
  memory: "4GB"

security:
  seccomp_profile: default
  shm_size: "64MB"

budget:
  max_duration: "30m"

vault:
  proxy: false
  bindings: []

audit:
  action_log: true

setup:
  # Install nvm to /opt/nvm — world-accessible (not /root/.nvm which is mode 700)
  - "mkdir -p /opt/nvm && export NVM_DIR=/opt/nvm && curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.4/install.sh | bash"
  - "export NVM_DIR=/opt/nvm && . \"$NVM_DIR/nvm.sh\" && nvm install 22"
  # Symlink to /usr/local/bin — always in PATH for root and non-root users
  - |
    export NVM_DIR=/opt/nvm
    . "$NVM_DIR/nvm.sh"
    ln -sf "$(which node)" /usr/local/bin/node
    ln -sf "$(which npm)" /usr/local/bin/npm
    ln -sf "$(which npx)" /usr/local/bin/npx
  - "npm install -g @google/gemini-cli"
