# Pen Test — security testing agent in a hardened governed sandbox
#
# Run security testing tools inside a governed pod. All network traffic
# is monitored via DNS. All actions are audited. The agent cannot modify
# the host. Perfect for authorized penetration testing with full audit trail.
#
# Usage:
#   sudo envpod init pentest -c examples/pen-test.yaml
#   sudo envpod run pentest --root -- bash
#   # Run security tools, everything logged
#   sudo envpod audit pentest              → full action history
#   sudo envpod audit pentest --security   → security analysis

name: pen-test
type: hardened

filesystem:
  system_access: safe
  workspace: /workspace
  mount_cwd: false
  tracking:
    watch: [/workspace]
    ignore: [/var/cache, /var/lib/apt, /tmp, /run]

network:
  mode: Monitored
  dns:
    mode: Monitor

processor:
  cores: 4.0
  memory: "4GB"
  max_pids: 512

security:
  seccomp_profile: default

budget:
  max_duration: "4h"

audit:
  action_log: true

setup:
  - "apt-get update && apt-get install -y --no-install-recommends nmap curl wget netcat-openbsd dnsutils whois python3 python3-pip git"
  - "pip install requests httpx"
