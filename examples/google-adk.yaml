# Google ADK pod — Google Agent Development Kit
#
# Google ADK is a Python framework for building, deploying, and orchestrating
# AI agents with Google's Gemini models. Supports multi-agent architectures,
# tool use, and memory management.
#
# Needs: googleapis.com (Gemini API), PyPI (pip install), GitHub.
# Python 3.10+.
#
# Usage:
#   sudo envpod init google-adk -c examples/google-adk.yaml
#   sudo envpod setup google-adk
#   sudo envpod run google-adk -- python agent.py

name: google-adk
type: standard
backend: native

network:
  mode: Monitored
  dns:
    mode: Whitelist
    allow:
      # Google AI APIs
      - generativelanguage.googleapis.com
      - "*.googleapis.com"
      # GitHub (code, repos)
      - github.com
      - "*.github.com"
      - "*.githubusercontent.com"
      # PyPI
      - pypi.org
      - "*.pypi.org"
      - files.pythonhosted.org

filesystem:
  system_access: advanced
  tracking:
    watch:
      - /home
      - /opt
      - /root
      - /workspace
    ignore:
      - /var/cache
      - /var/lib/apt
      - /var/lib/dpkg
      - /tmp
      - /run

processor:
  cores: 2.0
  memory: "2GB"
  tmp_size: "1GB"

security:
  seccomp_profile: default
  shm_size: "64MB"

budget:
  max_duration: "1h"

vault:
  proxy: false
  bindings: []

audit:
  action_log: true

setup:
  - "pip install google-adk"
