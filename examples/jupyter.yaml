# Jupyter Notebook — governed data science environment
#
# Run Jupyter inside a governed pod. Every notebook edit, output cell,
# and generated file goes through the COW overlay. Review results with
# diff, commit the good ones, rollback the rest.
#
# Usage:
#   sudo envpod init notebook -c examples/jupyter.yaml
#   sudo envpod run notebook --root -- bash
#   # Then open http://localhost:8888 in your browser
#
# Token: envpod (set in setup below)

name: jupyter
type: standard

filesystem:
  system_access: advanced
  mount_cwd: true
  tracking:
    watch: [/home, /workspace, /root]
    ignore: [/var/cache, /var/lib/apt, /tmp, /run]

network:
  mode: Monitored
  dns:
    mode: Denylist
    deny: []

processor:
  cores: 4.0
  memory: "8GB"
  max_pids: 512

ports:
  - "8888:8888"

devices:
  gpu: false

budget:
  max_duration: "12h"

audit:
  action_log: true

setup:
  - "apt-get update && apt-get install -y --no-install-recommends python3 python3-pip python3-venv"
  - "pip install jupyter numpy pandas matplotlib scipy scikit-learn seaborn plotly"
  - "jupyter notebook --generate-config"
  - |
    cat >> /root/.jupyter/jupyter_notebook_config.py << 'EOF'
    c.NotebookApp.ip = '0.0.0.0'
    c.NotebookApp.port = 8888
    c.NotebookApp.open_browser = False
    c.NotebookApp.token = 'envpod'
    c.NotebookApp.allow_root = True
    EOF

start_command: ["jupyter", "notebook", "--allow-root"]
