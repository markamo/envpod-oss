# Playwright pod — browser automation and testing framework
#
# Playwright enables reliable end-to-end testing and browser automation
# with Chromium, Firefox, and WebKit. Used for web scraping, UI testing,
# and browser-based agent workflows.
#
# Needs: open web access (browses arbitrary sites), PyPI, GitHub.
# Browser seccomp profile and large /dev/shm for Chrome stability.
# Python 3.8+.
#
# Usage:
#   sudo envpod init playwright -c examples/playwright.yaml
#   sudo envpod setup playwright
#   sudo envpod run playwright -- python test_script.py

name: playwright
type: standard
backend: native

network:
  mode: Monitored
  dns:
    mode: Blacklist
    deny:
      # Block internal/private networks only — needs open web access
      - "*.internal"
      - "*.local"
      - "*.corp"
      - "*.lan"

filesystem:
  system_access: advanced
  tracking:
    watch:
      - /home
      - /opt
      - /root
      - /workspace
    ignore:
      - /var/cache
      - /var/lib/apt
      - /var/lib/dpkg
      - /tmp
      - /run

processor:
  cores: 2.0
  memory: "4GB"
  tmp_size: "512MB"

security:
  seccomp_profile: browser
  shm_size: "256MB"

devices:
  desktop_env: openbox    # lightweight WM for agent browser windows (~50MB)

budget:
  max_duration: "1h"

audit:
  action_log: true

setup:
  - "pip install playwright"
  - "playwright install --with-deps chromium"
