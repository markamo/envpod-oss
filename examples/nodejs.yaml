# Node.js development pod — install Node.js via nvm inside the pod
#
# Uses system_access: advanced so nvm can create symlinks in /usr/local/bin
# without "Operation not permitted" errors.
#
# nvm installs to /opt/nvm (world-accessible). Node binaries are symlinked
# to /usr/local/bin so both root and non-root users can use them without
# any PATH modification.
#
# Usage:
#   sudo envpod init myapp -c examples/nodejs.yaml
#   sudo envpod run myapp -- bash
#   # Inside the pod: node -v, npm -v, npm install, etc.

name: nodejs
type: standard
backend: native

filesystem:
  system_access: advanced
  tracking:
    watch:
      - /home
      - /opt
      - /root
      - /workspace
    ignore:
      # System package managers
      - /var/cache
      - /var/lib/apt
      - /var/lib/dpkg
      - /tmp
      - /run
      # Node.js / npm toolchain (installed during setup)
      - /opt/nvm             # nvm install dir (large, not project code)
      - /root/.npm
      - /root/.node-gyp

network:
  mode: Monitored
  dns:
    mode: Whitelist
    allow:
      # nvm install script + Node.js downloads
      - raw.githubusercontent.com
      - "*.githubusercontent.com"
      - nodejs.org
      - "*.nodejs.org"
      # nvm git clone
      - github.com
      - "*.github.com"
      # npm registry
      - registry.npmjs.org
      - "*.npmjs.org"
      - "*.npmjs.com"

processor:
  cores: 2.0
  memory: "2GB"

security:
  seccomp_profile: default

budget:
  max_duration: "8h"

audit:
  action_log: true

setup:
  # Install nvm to /opt/nvm — world-accessible (not /root/.nvm which is mode 700)
  - "mkdir -p /opt/nvm && export NVM_DIR=/opt/nvm && curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.4/install.sh | bash"
  - "export NVM_DIR=/opt/nvm && . \"$NVM_DIR/nvm.sh\" && nvm install 22"
  # Symlink node binaries to /usr/local/bin — always in PATH for root and non-root users
  - |
    export NVM_DIR=/opt/nvm
    . "$NVM_DIR/nvm.sh"
    ln -sf "$(which node)" /usr/local/bin/node
    ln -sf "$(which npm)" /usr/local/bin/npm
    ln -sf "$(which npx)" /usr/local/bin/npx
