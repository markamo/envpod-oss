# Claude Code Development Pod
#
# Governed Claude Code session with host git/gh/claude profiles.
# Mounts CWD + host credentials. Monitor mode (logs all, blocks nothing).
#
# Usage:
#   cd /path/to/your/project
#   bash examples/claude-code-dev-setup.sh     # creates pod + copies project + profiles
#   sudo envpod run claude-dev -- bash -c 'cd /workspace/PROJECT && claude'
#
# After work:
#   sudo envpod diff claude-dev                             # review changes
#   sudo envpod commit claude-dev /workspace/PROJECT/ --output .  # export back to host
#   sudo envpod rollback claude-dev                         # discard everything
#
# Note: mount_cwd is off — project is copied into /workspace for writable COW access.
# Direct mount_cwd gives read-only access (governance by design).

name: claude-dev
type: standard

filesystem:
  system_access: advanced
  workspace: /workspace
  mount_cwd: false
  tracking:
    watch: [/workspace]
    ignore: [/var/cache, /var/lib/apt, /tmp, /run, /root/.npm, /opt/nvm]

network:
  mode: Monitored
  dns:
    mode: Monitor

processor:
  cores: 4.0
  memory: "8GB"
  max_pids: 256
  tmp_size: "1GB"

audit:
  action_log: true

budget:
  max_duration: "8h"
  warning: "1h"
  grace_period: "1m"

setup:
  - "apt-get install -y --no-install-recommends git curl wget python3 python3-pip build-essential gh"
  - "curl -fsSL https://deb.nodesource.com/setup_22.x | bash - && apt-get install -y nodejs"
  - "npm install -g @anthropic-ai/claude-code"
