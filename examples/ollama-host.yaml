# Ollama (host bind-mount) — local AI coding agent with governance
#
# Uses Ollama installed on the host via bind-mount. No download needed
# inside the pod — the host's Ollama binary and models are shared read-only.
#
# Prerequisites:
#   - Ollama installed on host: curl -fsSL https://ollama.ai/install.sh | sh
#   - At least one model pulled: ollama pull qwen3-coder
#
# Ollama runs inside the pod but uses host models via bind-mount.
# No model re-download needed. GPU passthrough for fast inference.
# Agent writes are governed — diff/commit/rollback as usual.
#
# Usage:
#   sudo envpod init ollama -c examples/ollama-host.yaml
#   sudo envpod run ollama -- bash
#   # Inside the pod:
#   ollama serve &
#   ollama list                    # sees host models instantly
#   ollama run qwen3-coder "write a python fibonacci function"
#
# With aider (AI pair programming):
#   ollama serve &
#   aider --model ollama_chat/qwen3-coder

name: ollama-host
type: standard

filesystem:
  system_access: advanced
  workspace: /workspace
  mount_cwd: true
  mounts:
    # Bind-mount host Ollama models (read-only, avoids re-downloading)
    # Adjust to your Ollama models path: typically ~/.ollama/models
    - path: /home/mymark/.ollama/models
      permissions: ReadOnly
  tracking:
    watch:
      - /home
      - /workspace
      - /opt
    ignore:
      - /var/cache
      - /var/lib/apt
      - /var/lib/dpkg
      - /tmp
      - /run

network:
  mode: Monitored
  dns:
    mode: Whitelist
    allow:
      # Ollama (installer)
      - ollama.ai
      - "*.ollama.ai"
      - "*.ollama.com"
      # GitHub (for cloning repos to work on)
      - github.com
      - "*.github.com"
      - "*.githubusercontent.com"
      # PyPI (for aider, other tools)
      - pypi.org
      - "*.pypi.org"
      - files.pythonhosted.org

processor:
  cores: 4.0
  memory: "8GB"
  max_pids: 512
  tmp_size: "4GB"

devices:
  gpu: true

security:
  seccomp_profile: default

budget:
  max_duration: "8h"

audit:
  action_log: true

setup:
  - "DEBIAN_FRONTEND=noninteractive apt-get update -qq && apt-get install -y --no-install-recommends git curl ca-certificates python3 python3-pip"
  - "curl -fsSL https://ollama.ai/install.sh | sed 's/tar /tar --no-same-permissions --warning=no-file-changed /' | sh || test -x /usr/local/bin/ollama"
  # Point Ollama at bind-mounted host models via env var
  - |
    cat >> /etc/profile.d/ollama.sh << 'EOF'
    export OLLAMA_MODELS=/home/mymark/.ollama/models
    EOF
  - "pip3 install --break-system-packages --ignore-installed urllib3 aider-chat"
