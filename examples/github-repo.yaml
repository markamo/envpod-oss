# GitHub Repo — clone, work, and push from a governed pod
#
# Agent works on a real GitHub repository with full governance.
# Changes go to the COW overlay — review with diff before pushing.
#
# Prerequisites:
#   - GitHub personal access token (for push access)
#
# Usage:
#   sudo envpod init gh-work -c examples/github-repo.yaml
#   sudo envpod vault gh-work set GITHUB_TOKEN ghp_...
#   sudo envpod run gh-work -- bash
#   # Inside the pod:
#   git clone https://$GITHUB_TOKEN@github.com/user/repo.git /workspace/repo
#   cd /workspace/repo && python3 agent.py
#
# Review and commit:
#   sudo envpod diff gh-work
#   sudo envpod commit gh-work /workspace/repo/src/ --rollback-rest
#
# SDK usage:
#   from envpod import Pod
#   with Pod("gh-work", config="examples/github-repo.yaml") as pod:
#       pod.vault_set("GITHUB_TOKEN", "ghp_...")
#       pod.run("git clone https://$GITHUB_TOKEN@github.com/user/repo.git /workspace/repo")
#       pod.run("cd /workspace/repo && python3 agent.py")
#       print(pod.diff())
#       pod.commit("/workspace/repo/src/", rollback_rest=True)

name: github-repo
type: standard

filesystem:
  system_access: advanced
  workspace: /workspace
  mount_cwd: false
  tracking:
    watch:
      - /workspace
      - /home
    ignore:
      - /var/cache
      - /var/lib/apt
      - /var/lib/dpkg
      - /tmp
      - /run
      - /workspace/repo/.git    # don't track git internals

network:
  mode: Monitored
  dns:
    mode: Allowlist
    allow:
      - github.com
      - "*.github.com"
      - "*.githubusercontent.com"
      # Package registries
      - pypi.org
      - "*.pypi.org"
      - files.pythonhosted.org
      - registry.npmjs.org
      - "*.npmjs.org"

processor:
  cores: 2.0
  memory: "4GB"
  max_pids: 512
  tmp_size: "1GB"

security:
  seccomp_profile: default

vault:
  env:
    - GITHUB_TOKEN

budget:
  max_duration: "4h"

audit:
  action_log: true

setup:
  - "apt-get install -y --no-install-recommends git curl ca-certificates python3 python3-pip"
  - |
    git config --global user.name "envpod-agent"
    git config --global user.email "agent@envpod.dev"
