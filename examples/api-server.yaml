# API Server — agent serves an API from inside a governed pod
#
# Run a web API inside a governed pod. External requests come in,
# the agent processes them, all filesystem changes go through COW.
# Perfect for AI-powered APIs where you want governance over what
# the agent writes, which endpoints it exposes, and what data it accesses.
#
# Usage:
#   sudo envpod init api -c examples/api-server.yaml
#   sudo envpod run api --root -- python3 /workspace/server.py
#   # API available at http://localhost:5000
#
# Or background:
#   sudo envpod start api

name: api-server
type: standard

filesystem:
  system_access: advanced
  mount_cwd: true
  tracking:
    watch: [/home, /workspace, /root]
    ignore: [/var/cache, /var/lib/apt, /tmp, /run]

network:
  mode: Monitored
  dns:
    mode: Denylist
    deny: []

processor:
  cores: 2.0
  memory: "4GB"
  max_pids: 256

ports:
  - "5000:5000"

budget:
  max_duration: "24h"

audit:
  action_log: true

setup:
  - "apt-get update && apt-get install -y --no-install-recommends python3 python3-pip"
  - "pip install flask gunicorn requests"
  - |
    cat > /workspace/server.py << 'SERVER'
    from flask import Flask, request, jsonify
    app = Flask(__name__)

    @app.route("/health")
    def health():
        return jsonify({"status": "ok"})

    @app.route("/process", methods=["POST"])
    def process():
        data = request.get_json()
        # Your AI agent logic here
        result = {"input": data, "output": "processed"}
        return jsonify(result)

    if __name__ == "__main__":
        app.run(host="0.0.0.0", port=5000)
    SERVER

start_command: ["python3", "/workspace/server.py"]
