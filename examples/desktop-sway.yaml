# Desktop pod (Sway) — Wayland-native compositor via noVNC
#
# Sway is a tiling Wayland compositor (i3-compatible). Runs natively
# inside the pod — no X11 needed. Foot terminal included (~150MB total).
# Best for Wayland-native apps and security-conscious setups (no X11
# keylogging attack surface).
#
# Access via browser at http://localhost:6080 (noVNC).
# Use `envpod clone` after first setup for instant copies.
#
# Usage:
#   sudo envpod init desktop-sway -c examples/desktop-sway.yaml
#   sudo envpod setup desktop-sway
#   sudo envpod run desktop-sway -b -- sway
#   # Open the noVNC URL from `envpod ls` in your browser

name: desktop-sway
type: standard
user: root

web_display:
  type: novnc
  port: 6080
  resolution: "1280x720"

devices:
  desktop_env: sway

filesystem:
  system_access: advanced

network:
  mode: Monitored
  dns:
    mode: Blacklist
    deny:
      - "*.internal"
      - "*.local"
      - "*.corp"

processor:
  cores: 2.0
  memory: "2GB"
  max_pids: 1024

security:
  seccomp_profile: browser
  shm_size: "256MB"

budget:
  max_duration: "8h"

audit:
  action_log: true
