# LangGraph pod — LangChain's agent orchestration framework
#
# LangGraph is a framework for building stateful, multi-actor AI agent
# workflows. Supports multiple LLM providers (OpenAI, Anthropic, Google)
# via LangChain integrations.
#
# Needs: LLM provider APIs, PyPI (pip install), GitHub.
# Python 3.9+.
#
# Usage:
#   sudo envpod init langgraph -c examples/langgraph.yaml
#   sudo envpod setup langgraph
#   sudo envpod run langgraph -- python workflow.py

name: langgraph
type: standard
backend: native

network:
  mode: Monitored
  dns:
    mode: Allowlist
    allow:
      # LLM providers
      - api.anthropic.com
      - "*.anthropic.com"
      - api.openai.com
      - "*.openai.com"
      - generativelanguage.googleapis.com
      - "*.googleapis.com"
      # GitHub (code, repos)
      - github.com
      - "*.github.com"
      - "*.githubusercontent.com"
      # PyPI
      - pypi.org
      - "*.pypi.org"
      - files.pythonhosted.org

filesystem:
  system_access: advanced
  tracking:
    watch:
      - /home
      - /opt
      - /root
      - /workspace
    ignore:
      - /var/cache
      - /var/lib/apt
      - /var/lib/dpkg
      - /tmp
      - /run

processor:
  cores: 2.0
  memory: "2GB"

security:
  seccomp_profile: default
  shm_size: "64MB"

budget:
  max_duration: "1h"

vault:
  proxy: false
  bindings: []

audit:
  action_log: true

setup:
  - "pip install langgraph langchain-openai langchain-anthropic"
