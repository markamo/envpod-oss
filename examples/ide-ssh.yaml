# IDE via SSH — connect VS Code, Cursor, or JetBrains to a governed pod
#
# Your IDE connects to the pod via SSH. The agent and developer share
# the same governed filesystem — all changes go through the COW overlay.
# Review with diff, accept with commit, discard with rollback.
#
# Usage:
#   sudo envpod init dev -c examples/ide-ssh.yaml
#   sudo envpod run dev --root -- bash
#
# Then connect your IDE:
#   VS Code:    code --remote ssh-remote+root@localhost:2222 /workspace
#   Cursor:     cursor --remote ssh-remote+root@localhost:2222 /workspace
#   JetBrains:  Gateway → SSH → localhost:2222 → /workspace
#
# Password: envpod (or set your own in setup below)
# SSH key:  copy your public key into setup commands

name: ide-dev
type: standard

filesystem:
  system_access: advanced
  mount_cwd: true
  tracking:
    watch: [/home, /workspace, /opt, /root]
    ignore: [/var/cache, /var/lib/apt, /tmp, /run]

network:
  mode: Monitored
  dns:
    mode: Denylist
    deny: []

processor:
  cores: 4.0
  memory: "8GB"
  max_pids: 512

ports:
  - "2222:22"

devices:
  gpu: false

budget:
  max_duration: "12h"

audit:
  action_log: true

setup:
  - "apt-get update && apt-get install -y --no-install-recommends openssh-server git curl python3 python3-pip"
  - "mkdir -p /run/sshd"
  - "echo 'PermitRootLogin yes' >> /etc/ssh/sshd_config"
  - "echo 'root:envpod' | chpasswd"
  - "/usr/sbin/sshd"
