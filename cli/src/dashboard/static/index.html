<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>envpod dashboard</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/htmx.min.js"></script>
</head>
<body>
<div class="container">
    <header>
        <h1>envpod <span class="version">dashboard</span></h1>
    </header>

    <div id="pod-list"
         hx-get="/api/v1/pods"
         hx-trigger="load, every 2s"
         hx-swap="innerHTML">
        <div class="empty">
            <h3>Loading pods...</h3>
        </div>
    </div>
</div>

<script>
// Transform JSON API response into pod cards
document.body.addEventListener('htmx:beforeSwap', function(evt) {
    if (evt.detail.target.id === 'pod-list') {
        try {
            const pods = JSON.parse(evt.detail.xhr.responseText);
            if (pods.length === 0) {
                evt.detail.serverResponse = `
                    <div class="empty">
                        <h3>No pods found</h3>
                        <p>Create a pod with: sudo envpod init my-agent</p>
                    </div>`;
            } else {
                evt.detail.serverResponse = '<div class="pod-grid">' +
                    pods.map(pod => renderPodCard(pod)).join('') +
                    '</div>';
            }
        } catch(e) {
            // Let htmx handle non-JSON responses normally
        }
    }
});

function renderPodCard(pod) {
    const statusClass = pod.status || 'stopped';
    const mem = pod.resources ? formatBytes(pod.resources.memory_bytes) : '-';
    const pids = pod.resources ? pod.resources.pids_current : '-';
    const diffBadge = pod.diff_count > 0
        ? `<span class="badge yellow">${pod.diff_count} changes</span>`
        : '';
    const vaultBadge = pod.vault_proxy
        ? `<span class="badge purple">${pod.vault_binding_count} bindings</span>`
        : '';

    return `
        <a href="/pod.html?name=${encodeURIComponent(pod.name)}" class="pod-card">
            <div class="name">
                <span class="status ${statusClass}"></span>
                ${escapeHtml(pod.name)}
            </div>
            <div class="meta">
                <span class="item">${statusClass}</span>
                <span class="item">mem: ${mem}</span>
                <span class="item">pids: ${pids}</span>
            </div>
            <div style="margin-top:8px; display:flex; gap:6px;">
                ${diffBadge}
                ${vaultBadge}
            </div>
        </a>`;
}

function formatBytes(bytes) {
    if (!bytes || bytes === 0) return '0 B';
    const units = ['B', 'KB', 'MB', 'GB'];
    let i = 0;
    let val = bytes;
    while (val >= 1024 && i < units.length - 1) { val /= 1024; i++; }
    return val.toFixed(i > 0 ? 1 : 0) + ' ' + units[i];
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}
</script>
</body>
</html>
